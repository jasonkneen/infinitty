name: Release

# Manual backup for scripts/release.sh (the primary release path).
# Run from the Actions tab with the tag to build, e.g. v0.1.9.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.9)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Run tests
        run: swift test

      - name: Build universal binaries
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Assemble app bundle
        run: |
          VERSION="${RELEASE_TAG#v}"
          BIN=.build/apple/Products/Release
          if [ -x .build/out/Products/Release/infinitty ]; then BIN=.build/out/Products/Release; fi
          scripts/make-app.sh "$BIN" "$VERSION" dist
          cp "$BIN/infinitty-mcp" dist/

      - name: Sign (skipped if no cert secret)
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          IDENTITY: "Developer ID Application: Jason Kneen (SW75ZJJ5R6)"
        run: |
          if [ -z "$MAC_CERT_P12_BASE64" ]; then
            echo "No signing cert configured — shipping unsigned."
            exit 0
          fi
          KEYCHAIN_PASS=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASS" build.keychain
          security set-keychain-settings -t 3600 build.keychain
          echo "$MAC_CERT_P12_BASE64" | base64 -d > cert.p12
          security import cert.p12 -k build.keychain -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign
          rm cert.p12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" build.keychain > /dev/null
          codesign --force --options runtime --timestamp --sign "$IDENTITY" dist/infinitty-mcp
          codesign --force --options runtime --timestamp --sign "$IDENTITY" dist/Infinitty.app/Contents/MacOS/infinitty-mcp
          codesign --force --options runtime --timestamp --sign "$IDENTITY" dist/Infinitty.app
          codesign -vvv --strict dist/Infinitty.app

      - name: Notarize & staple (skipped if no Apple secret)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ]; then
            echo "No Apple credentials configured — skipping notarization."
            exit 0
          fi
          ditto -c -k --keepParent dist/Infinitty.app notarize-app.zip
          xcrun notarytool submit notarize-app.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple dist/Infinitty.app
          ditto -c -k dist/infinitty-mcp notarize-mcp.zip
          xcrun notarytool submit notarize-mcp.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait

      - name: Package
        run: |
          VERSION="${RELEASE_TAG#v}"
          STAGE="infinitty-$VERSION"
          mkdir -p "pkg/$STAGE"
          cp -R dist/Infinitty.app "pkg/$STAGE/"
          cp dist/infinitty-mcp "pkg/$STAGE/"
          cp -R shell-integration "pkg/$STAGE/"
          cp infinitty.conf.example README.md "pkg/$STAGE/"
          tar -czf "infinitty-$VERSION-macos.tar.gz" -C pkg "$STAGE"
          shasum -a 256 "infinitty-$VERSION-macos.tar.gz" > "infinitty-$VERSION-macos.tar.gz.sha256"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              infinitty-*-macos.tar.gz \
              infinitty-*-macos.tar.gz.sha256 \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              infinitty-*-macos.tar.gz \
              infinitty-*-macos.tar.gz.sha256 \
              --title "infinitty $RELEASE_TAG" \
              --generate-notes
          fi

  npm:
    name: Publish npm package
    needs: release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Publish @jasonkneen/infinitty (skipped if no NPM_TOKEN or already published)
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "No NPM_TOKEN configured — skipping npm publish."
            exit 0
          fi
          VERSION="${RELEASE_TAG#v}"
          if npm view "@jasonkneen/infinitty@$VERSION" version >/dev/null 2>&1; then
            echo "@jasonkneen/infinitty@$VERSION already published — skipping."
            exit 0
          fi
          npm version "$VERSION" --no-git-tag-version
          npm publish --access public
